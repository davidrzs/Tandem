name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env
        run: |
          cp .env.example .env
          secret="$(openssl rand -base64 32)"
          sed -i "s|^BETTER_AUTH_SECRET=.*|BETTER_AUTH_SECRET=${secret}|" .env

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Unit + integration tests
        run: pnpm --filter @tandem/editor --filter @tandem/core --filter @tandem/server test

      - name: Web build
        run: pnpm --filter @tandem/web build

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: End-to-end tests
        run: bash apps/web/e2e/run-all.sh

      - name: Upload e2e logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: |
            /tmp/rt-http.log
            /tmp/rt-vite.log
            /tmp/rt-migrate.log
          if-no-files-found: ignore
